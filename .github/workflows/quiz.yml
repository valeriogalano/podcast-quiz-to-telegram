name: Daily Quiz

on:
  schedule:
    - cron: "0 11,15 * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run quiz bot
        env:
          FEED_RSS_URL: ${{ vars.FEED_RSS_URL }}
          GH_REPO: ${{ vars.GH_REPO }}
          GH_SCRIPTS_PATH: ${{ vars.GH_SCRIPTS_PATH }}
          SCRIPT_EXTENSION: ${{ vars.SCRIPT_EXTENSION }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          TELEGRAM_ACTIVITY_CHAT_ID: ${{ vars.TELEGRAM_ACTIVITY_CHAT_ID }}
          TELEGRAM_ACTIVITY_WINDOW_MINUTES: ${{ vars.TELEGRAM_ACTIVITY_WINDOW_MINUTES }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python quiz_bot.py

